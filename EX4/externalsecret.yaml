apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: payment-secret
  namespace: external-secrets
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secretstore
    kind: SecretStore

  target:
    name: payment-secret

  data:
  - secretKey: DB_USERNAME
    remoteRef:
      key: payment-app-secret
      property: DB_USERNAME

  - secretKey: DB_PASSWORD
    remoteRef:
      key: payment-app-secret
      property: DB_PASSWORD

  - secretKey: JWT_SECRET
    remoteRef:
      key: payment-app-secret
      property: JWT_SECRET