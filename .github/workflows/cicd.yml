name: Java CI

on:
  push:
    branches:
      - main

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Run Tests
        run: mvn test

      - name: Build Jar
        run: mvn clean package

      - name: Create Result File
        run: |
          echo "===== CI PIPELINE RESULT =====" > build-result.txt
          echo "Build Successful" >> build-result.txt
          echo "JUnit Tests Passed" >> build-result.txt
          echo "Artifact Generated Successfully" >> build-result.txt

      - name: Upload Result File
        uses: actions/upload-artifact@v4
        with:
          name: build-result
          path: build-result.txt

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-cicd-demo
          path: target/*.jar