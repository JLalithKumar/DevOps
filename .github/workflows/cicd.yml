name: Java CI

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-test-and-update-result:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Run Tests
        run: mvn test

      - name: Build Jar
        run: mvn clean package

      - name: Run Application
        run: |
          java -jar target/java-cicd-demo-1.0.jar > app-output.txt

      - name: Generate RESULT.md
        run: |
          echo "# CI Pipeline Result" > RESULT.md
          echo "" >> RESULT.md
          echo "## Build Status" >> RESULT.md
          echo "BUILD SUCCESS" >> RESULT.md
          echo "" >> RESULT.md
          echo "## JUnit Test Status" >> RESULT.md
          echo "Tests Passed Successfully" >> RESULT.md
          echo "" >> RESULT.md
          echo "## Application Output" >> RESULT.md
          echo '```' >> RESULT.md
          cat app-output.txt >> RESULT.md
          echo '```' >> RESULT.md
          echo "" >> RESULT.md
          echo "Generated by GitHub Actions." >> RESULT.md

      - name: Commit RESULT.md
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "test@test.com"
          git add RESULT.md
          git commit -m "Update RESULT.md from CI" || echo "No changes to commit"
          git push