apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: payment-secret
  namespace: default
spec:
  refreshInterval: 30s

  secretStoreRef:
    name: aws-secret-store
    kind: ClusterSecretStore

  target:
    name: payment-secret
    creationPolicy: Owner

  data:
  - secretKey: username
    remoteRef:
      key: payment-secret
      property: username

  - secretKey: password
    remoteRef:
      key: payment-secret
      property: password

  - secretKey: jwt
    remoteRef:
      key: payment-secret
      property: jwt